<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo arredondado -->
  <rect width="100" height="100" rx="22" fill="#1a237e"/>

  <!-- Cruz no topo -->
  <rect x="47" y="8" width="6" height="18" rx="2" fill="#ffffff"/>
  <rect x="40" y="13" width="20" height="6" rx="2" fill="#ffffff"/>

  <!-- Telhado da igreja -->
  <polygon points="50,26 22,48 78,48" fill="#3f51b5"/>

  <!-- Corpo da igreja -->
  <rect x="25" y="48" width="50" height="36" rx="2" fill="#3f51b5"/>

  <!-- Porta central -->
  <rect x="42" y="62" width="16" height="22" rx="4" fill="#1a237e"/>

  <!-- Janelas laterais -->
  <rect x="30" y="55" width="9" height="11" rx="3" fill="#7986cb"/>
  <rect x="61" y="55" width="9" height="11" rx="3" fill="#7986cb"/>

  <!-- Brilho da janela esquerda -->
  <rect x="31" y="56" width="3" height="4" rx="1" fill="#e8eaf6" opacity="0.6"/>
  <!-- Brilho da janela direita -->
  <rect x="62" y="56" width="3" height="4" rx="1" fill="#e8eaf6" opacity="0.6"/>

  <!-- Degrau da entrada -->
  <rect x="38" y="82" width="24" height="4" rx="1" fill="#5c6bc0"/>
</svg>
