[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = test_*.py *_test.py tests.py tests_*.py
testpaths = tests church
addopts = -q --strict-markers --maxfail=1 --cov=church --cov-report=term-missing --cov-fail-under=70 --cov-config=.coveragerc
markers =
	critico: testes de fluxos criticos de negocio
	integracao: testes de integracao entre camadas e fronteiras internas
