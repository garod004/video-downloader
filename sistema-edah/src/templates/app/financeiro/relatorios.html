{% extends "app/base.html" %}
{% block title %}Relatórios Financeiros{% endblock %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2"><i class="fas fa-chart-bar"></i> Relatórios Financeiros</h1>
</div>
<div class="row g-3">
  <div class="col-md-4"><div class="card shadow border-success"><div class="card-body"><h6>Entradas (acumulado)</h6><p class="h4 text-success">R$ {{ total_entradas|floatformat:2 }}</p></div></div></div>
  <div class="col-md-4"><div class="card shadow border-danger"><div class="card-body"><h6>Saídas (acumulado)</h6><p class="h4 text-danger">R$ {{ total_saidas|floatformat:2 }}</p></div></div></div>
  <div class="col-md-4"><div class="card shadow border-primary"><div class="card-body"><h6>Saldo</h6><p class="h4">R$ {{ saldo|floatformat:2 }}</p></div></div></div>
</div>
{% endblock %}
