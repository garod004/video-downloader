name: QA Quality Gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: qa-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DJANGO_SECRET_KEY: ci-temporary-secret-key
      DJANGO_DEBUG: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Django system check
        run: uv run python manage.py check

      - name: Run pytest with coverage gate
        run: uv run python -m pytest

      - name: Security audit dependencies
        run: uv run pip-audit

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2

  frontend-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DJANGO_SECRET_KEY: ci-temporary-secret-key
      DJANGO_DEBUG: "True"
      BOOTSTRAP_ADMIN_PASSWORD: Admin@123456
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:frontend

      - name: Security audit npm dependencies
        run: npm audit --audit-level=high

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run critical theme gate (blocking)
        run: npm run test:e2e:theme

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality
      - frontend-and-e2e
    env:
      DJANGO_SECRET_KEY: ci-temporary-secret-key
      DJANGO_DEBUG: "True"
      BOOTSTRAP_ADMIN_PASSWORD: Admin@123456
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run smoke health checks
        run: bash scripts/smoke_healthcheck.sh
