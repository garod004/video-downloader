<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fundo vermelho arredondado -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect width="100" height="50" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Ícone de arquivo -->
  <rect x="28" y="18" width="30" height="40" rx="3" fill="white" opacity="0.95"/>
  <polyline points="58,18 70,30 70,72 28,72" fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round" opacity="0.95"/>
  <line x1="58" y1="18" x2="58" y2="30" stroke="white" stroke-width="4.5" opacity="0.95"/>
  <line x1="58" y1="30" x2="70" y2="30" stroke="white" stroke-width="4.5" opacity="0.95"/>

  <!-- Seta de conversão (↓) -->
  <line x1="49" y1="58" x2="49" y2="80" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <polyline points="41,72 49,80 57,72" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
